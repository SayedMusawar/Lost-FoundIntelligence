<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>FAST Peshawar · Lost & Found Intelligence System</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Syne:wght@400;500;600;700;800&family=Inter:wght@300;400;500;600&display=swap"
      rel="stylesheet" />
    <style>
      *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
      :root {
        /* ── Palette from image ── */
        --white:      #fafafa;
        --sky:        #bde3f7;
        --blue:       #1178c2;
        --dark:       #1e2530;

        /* ── Derived ── */
        --blue-light: #e8f4fd;
        --blue-mid:   #4a9fd4;
        --blue-dark:  #0d5f9e;
        --blue-xdark: #0a4a7a;
        --sky-light:  #f0f8fe;

        --text:       #1e2530;
        --text2:      #4a5568;
        --text3:      #8a97aa;
        --border:     #d8eaf6;
        --border2:    #b8d8f0;
        --surface:    #ffffff;
        --surface2:   #f0f8fe;
        --surface3:   #e8f4fd;

        --font-h: 'Syne', sans-serif;
        --font-b: 'Inter', sans-serif;
        --tr:     all 0.2s cubic-bezier(0.4,0,0.2,1);
        --r-sm:   6px;
        --r-md:   10px;
        --r-lg:   14px;
        --r-xl:   20px;
        --sidebar-w: 248px;
        --topbar-h:  60px;
        --shadow-sm: 0 1px 4px rgba(17,120,194,0.08);
        --shadow-md: 0 4px 20px rgba(17,120,194,0.12);
        --shadow-lg: 0 8px 40px rgba(17,120,194,0.16);
      }
      html { font-size: 16px; }
      body {
        font-family: var(--font-b);
        background: var(--white);
        color: var(--text);
        -webkit-font-smoothing: antialiased;
        min-height: 100vh;
        overflow-x: hidden;
      }
      #root { min-height: 100vh; }
      ::-webkit-scrollbar { width: 5px; }
      ::-webkit-scrollbar-track { background: var(--sky-light); }
      ::-webkit-scrollbar-thumb { background: var(--sky); border-radius: 3px; }
      input, select, textarea, button { font-family: var(--font-b); }
      button { cursor: pointer; border: none; outline: none; }
      input:focus, select:focus, textarea:focus {
        outline: none;
        border-color: var(--blue) !important;
        box-shadow: 0 0 0 3px rgba(17,120,194,0.12);
      }

      @keyframes fadeUp {
        from { opacity:0; transform:translateY(14px); }
        to   { opacity:1; transform:translateY(0); }
      }
      @keyframes fadeIn  { from { opacity:0; } to { opacity:1; } }
      @keyframes spin    { to { transform:rotate(360deg); } }
      @keyframes slideR  {
        from { opacity:0; transform:translateX(-16px); }
        to   { opacity:1; transform:translateX(0); }
      }
      @keyframes float {
        0%,100% { transform: translateY(0); }
        50%     { transform: translateY(-8px); }
      }
      @keyframes shimmer {
        0%   { background-position: -400px 0; }
        100% { background-position:  400px 0; }
      }

      .fade-up  { animation: fadeUp  0.45s ease both; }
      .fade-in  { animation: fadeIn  0.3s  ease both; }
      .slide-r  { animation: slideR  0.4s  ease both; }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
