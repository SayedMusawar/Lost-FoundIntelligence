<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>I-FAST · Lost & Found</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;500;600;700;800&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet" />
    <style>
      *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
      :root {
        --bg:        #080b12;
        --bg2:       #0e1220;
        --bg3:       #131929;
        --surface:   #181f30;
        --surface2:  #1e2840;
        --border:    rgba(255,255,255,0.06);
        --border2:   rgba(255,255,255,0.10);
        --teal:      #00e5b0;
        --teal2:     #00c49a;
        --tealGlow:  rgba(0,229,176,0.15);
        --amber:     #f5a623;
        --red:       #ff4d4d;
        --green:     #00d68f;
        --blue:      #4d9fff;
        --text:      #eef0f8;
        --text2:     #7d8aaa;
        --text3:     #404d6a;
        --font-h:    'Syne', sans-serif;
        --font-b:    'Inter', sans-serif;
        --r-sm:      6px;
        --r-md:      10px;
        --r-lg:      14px;
        --r-xl:      20px;
        --sidebar-w: 240px;
        --topbar-h:  56px;
        --tr:        all 0.2s cubic-bezier(0.4,0,0.2,1);
      }
      html { font-size: 16px; }
      body {
        font-family: var(--font-b);
        background: var(--bg);
        color: var(--text);
        -webkit-font-smoothing: antialiased;
        min-height: 100vh;
        overflow-x: hidden;
      }
      #root { min-height: 100vh; }
      ::-webkit-scrollbar { width: 4px; }
      ::-webkit-scrollbar-track { background: transparent; }
      ::-webkit-scrollbar-thumb { background: var(--surface2); border-radius: 2px; }
      input, select, textarea, button { font-family: var(--font-b); }
      button { cursor: pointer; border: none; outline: none; }
      input:focus, select:focus, textarea:focus { outline: none; }

      @keyframes fadeUp {
        from { opacity:0; transform:translateY(16px); }
        to   { opacity:1; transform:translateY(0); }
      }
      @keyframes fadeIn {
        from { opacity:0; } to { opacity:1; }
      }
      @keyframes glow {
        0%,100% { box-shadow: 0 0 20px rgba(0,229,176,0.15); }
        50%      { box-shadow: 0 0 40px rgba(0,229,176,0.30); }
      }
      @keyframes spin {
        to { transform: rotate(360deg); }
      }
      @keyframes slideRight {
        from { opacity:0; transform:translateX(-20px); }
        to   { opacity:1; transform:translateX(0); }
      }
      @keyframes pulse {
        0%,100% { opacity:1; } 50% { opacity:0.4; }
      }
      .fade-up  { animation: fadeUp  0.45s ease both; }
      .fade-in  { animation: fadeIn  0.3s  ease both; }
      .slide-r  { animation: slideRight 0.4s ease both; }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
